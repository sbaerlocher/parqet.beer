---
name: Code Review

'on':
  pull_request:
    branches: [main]
    types: [opened, synchronize, ready_for_review, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: read
  id-token: write

jobs:
  claude-review:
    name: Claude Code Review
    uses: sbaerlocher/.github/.github/workflows/ai-claude-review.yml@2026-05-03
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
