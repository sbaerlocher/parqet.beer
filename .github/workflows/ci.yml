# Continuous Integration for parqet.beer.
#
# Quality/security gates (lint, typecheck, format, unit tests with coverage,
# build, dependency audit, Trivy) are delegated to the shared reusable
# workflow in sbaerlocher/.github. The E2E job stays local because the
# reusable workflow doesn't cover Playwright.
#
# Deployment is handled by the Cloudflare Workers Git integration (configured
# in the Cloudflare dashboard), not by GitHub Actions — so this file
# deliberately has no deploy job and no Cloudflare secrets.
name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: sbaerlocher/.github/.github/workflows/ci-js.yml@2026-04-25
    secrets: inherit

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [ci]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6
        with:
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  status:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [ci, e2e]
    if: always()
    steps:
      - name: Check results
        env:
          CI_RESULT: ${{ needs.ci.result }}
          E2E_RESULT: ${{ needs.e2e.result }}
        run: |
          if [[ "$CI_RESULT" != "success" || "$E2E_RESULT" != "success" ]]; then
            echo "CI failed (ci=$CI_RESULT, e2e=$E2E_RESULT)"
            exit 1
          fi
          echo "All checks passed"
