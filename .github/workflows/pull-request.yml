# Pull Request checks for parqet.beer.
#
# Quality/security gates (lint, typecheck, format, unit tests with coverage,
# build, dependency audit, Trivy) are delegated to the shared reusable
# workflow in sbaerlocher/.github. The E2E job stays local because the
# reusable workflow doesn't cover Playwright. CodeQL and the AI review run
# as jobs here (public-repo convention), not as their own files.
#
# Deployment is handled by the Cloudflare Workers Git integration (configured
# in the Cloudflare dashboard), not by GitHub Actions — so there is no
# merge.yml and no deploy job.
name: Pull Request

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: pull-request-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: sbaerlocher/.github/.github/workflows/ci-js.yml@2026-07-13
    secrets: inherit

  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      e2e: ${{ steps.filter.outputs.e2e }}
    steps:
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        id: filter
        with:
          filters: |
            e2e:
              - 'src/**'
              - 'tests/e2e/**'
              - 'playwright.config.ts'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - '.github/workflows/pull-request.yml'

  code-analysis:
    name: SAST (CodeQL)
    uses: sbaerlocher/.github/.github/workflows/security-code.yml@2026-07-13
    permissions:
      contents: read
      security-events: write
      actions: read
    with:
      languages: '["javascript-typescript"]'
      node-version-file: .nvmrc
      package-manager: pnpm
      concurrency-suffix: code

  claude-review:
    name: Claude Code Review
    uses: sbaerlocher/.github/.github/workflows/ai-claude-review.yml@2026-07-13
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [ci, changes]
    if: needs.changes.outputs.e2e == 'true'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          run_install: false
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  status:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [ci, code-analysis, e2e]
    if: always()
    steps:
      - name: Check results
        env:
          CI_RESULT: ${{ needs.ci.result }}
          CODEQL_RESULT: ${{ needs.code-analysis.result }}
          E2E_RESULT: ${{ needs.e2e.result }}
        run: |
          # E2E is skipped when no relevant paths changed (needs.changes gate);
          # a skipped E2E is a pass, so only success/skipped are acceptable.
          if [[ "$CI_RESULT" != "success" || "$CODEQL_RESULT" != "success" ]] \
            || [[ "$E2E_RESULT" != "success" && "$E2E_RESULT" != "skipped" ]]; then
            echo "PR checks failed (ci=$CI_RESULT, codeql=$CODEQL_RESULT, e2e=$E2E_RESULT)"
            exit 1
          fi
          echo "All checks passed"
