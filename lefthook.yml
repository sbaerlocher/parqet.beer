pre-commit:
  parallel: true
  commands:
    prettier:
      glob: '*.{js,ts,svelte,json,md,yml,yaml,css}'
      run: pnpm prettier --check {staged_files}
    eslint:
      glob: '*.{js,ts,svelte}'
      run: pnpm eslint {staged_files}

pre-push:
  commands:
    typecheck:
      run: pnpm check
    test:
      run: pnpm test
