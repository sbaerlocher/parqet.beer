# Scheduled security scan for parqet.beer.
#
# Public repo: runs nightly (GitHub Actions minutes are free for public repos).
# CodeQL also runs on pull requests as a job in pull-request.yml; this file
# covers the scheduled sweep plus dependency and secret scanning.
name: Nightly Security Scan

on:
  schedule:
    - cron: '0 2 * * *' # Daily 02:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: write
  actions: read

jobs:
  code-analysis:
    name: SAST (CodeQL)
    uses: sbaerlocher/.github/.github/workflows/security-code.yml@2026-07-19
    with:
      languages: '["javascript-typescript"]'
      node-version-file: .nvmrc
      package-manager: pnpm
      concurrency-suffix: code

  dependency-scan:
    name: Dependencies & Licenses
    uses: sbaerlocher/.github/.github/workflows/security-deps.yml@2026-07-19
    with:
      language: 'javascript'
      enable-license-check: true
      concurrency-suffix: deps

  secret-detection:
    name: Secret Detection
    uses: sbaerlocher/.github/.github/workflows/security-secrets.yml@2026-07-19
    with:
      concurrency-suffix: secrets
