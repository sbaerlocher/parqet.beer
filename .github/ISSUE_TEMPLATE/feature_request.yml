name: Feature Request
description: Suggest an idea or enhancement for parqet.beer
title: '[Feature]: '
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe the problem first, then your proposed solution.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is the user problem or limitation you are running into?
      placeholder: I cannot compare my portfolio against a non-EUR/CHF currency.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you would like to happen.
      placeholder: Add a USD/GBP toggle on the dashboard.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you considered, and why they did not fit.
    validations:
      required: false
